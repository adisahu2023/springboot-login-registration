<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a student account">
    <title>Student Registration</title>
    <style>
        :root { --ink: #172033; --muted: #687086; --line: #dfe3ec; --primary: #5b4cf0; --primary-dark: #4638d3; --danger: #b42318; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 30px 20px; color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 12% 15%, rgba(91,76,240,.15), transparent 28%), radial-gradient(circle at 88% 85%, rgba(38,185,164,.13), transparent 26%), #f6f7fb; }
        .card { width: min(100%, 620px); padding: 40px; border: 1px solid rgba(255,255,255,.8); border-radius: 24px; background: rgba(255,255,255,.94); box-shadow: 0 24px 70px rgba(28,35,60,.12); }
        .brand { width: 48px; height: 48px; display: grid; place-items: center; margin-bottom: 24px; border-radius: 14px; color: white; font-size: 22px; font-weight: 800; background: linear-gradient(135deg,#796cf7,var(--primary-dark)); box-shadow: 0 10px 25px rgba(91,76,240,.3); }
        h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -.7px; }
        .subtitle { margin: 0 0 28px; color: var(--muted); line-height: 1.55; }
        .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .field.full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 650; }
        input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 12px; outline: none; color: var(--ink); font: inherit; background: #fff; transition: border-color .2s, box-shadow .2s; }
        input { height: 50px; padding: 0 15px; }
        textarea { min-height: 96px; padding: 13px 15px; resize: vertical; }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91,76,240,.12); }
        .message { display: none; margin: 20px 0 0; padding: 11px 13px; border-radius: 10px; color: var(--danger); font-size: 14px; background: #fff0ee; }
        .message.visible { display: block; }
        .message.success { color: #067647; background: #ecfdf3; }
        .submit-button { width: 100%; height: 52px; margin-top: 22px; border: 0; border-radius: 12px; color: white; font: inherit; font-weight: 750; background: var(--primary); box-shadow: 0 10px 24px rgba(91,76,240,.24); cursor: pointer; transition: background .2s, transform .15s; }
        .submit-button:hover { background: var(--primary-dark); }
        .submit-button:active { transform: translateY(1px); }
        .submit-button:disabled { opacity: .7; cursor: wait; }
        .login-link { margin: 24px 0 0; color: var(--muted); text-align: center; font-size: 14px; }
        a { color: var(--primary); font-weight: 700; text-decoration: none; }
        a:hover { text-decoration: underline; }
        @media (max-width: 600px) { .card { padding: 30px 24px; } .fields { grid-template-columns: 1fr; } .field.full { grid-column: auto; } }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand" aria-hidden="true">S</div>
        <h1>Create your account</h1>
        <p class="subtitle">Enter your details to join the student portal.</p>

        <form id="studentForm">
            <div class="fields">
                <div class="field"><label for="id">Student ID</label><input type="number" id="id" placeholder="e.g. 1042" required></div>
                <div class="field"><label for="name">Full name</label><input type="text" id="name" placeholder="Your full name" autocomplete="name" required></div>
                <div class="field"><label for="email">Email address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email" required></div>
                <div class="field"><label for="password">Password</label><input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required></div>
                <div class="field full"><label for="address">Address</label><textarea id="address" placeholder="Enter your address" autocomplete="street-address" required></textarea></div>
            </div>
            <p class="message" id="message" role="alert" aria-live="polite"></p>
            <button class="submit-button" id="submitButton" type="submit">Create account</button>
        </form>
        <p class="login-link">Already registered? <a href="login.html">Sign in</a></p>
    </main>

    <script>
        const baseUrl = "http://localhost:8080/registration";
        const form = document.getElementById("studentForm");
        const message = document.getElementById("message");
        const submitButton = document.getElementById("submitButton");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            message.className = "message";
            submitButton.disabled = true;
            submitButton.textContent = "Creating account...";

            const student = {
                id: Number(document.getElementById("id").value),
                name: document.getElementById("name").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value,
                address: document.getElementById("address").value.trim()
            };

            try {
                const response = await fetch(baseUrl, { method: "POST", credentials:"include", headers: { "Content-Type": "application/json" }, body: JSON.stringify(student) });
                if (!response.ok) throw new Error("Could not create your account. Please check your details.");
                message.textContent = "Account created successfully. You can now sign in.";
                message.className = "message success visible";
                window.location.href="home.html";
                form.reset();
            } catch (error) {
                message.textContent = error.message === "Failed to fetch" ? "Unable to reach the server. Please try again." : error.message;
                message.className = "message visible";
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "Create account";
            }
        });
    </script>
</body>
</html>
