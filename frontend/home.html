<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student account dashboard">
    <title>Student Dashboard</title>
    <style>
        :root {
            --ink: #172033;
            --muted: #687086;
            --primary: #5b4cf0;
            --primary-dark: #4638d3;
            --line: #e5e7ef;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 8% 8%, rgba(91, 76, 240, .16), transparent 28%),
                radial-gradient(circle at 92% 92%, rgba(38, 185, 164, .13), transparent 27%),
                #f6f7fb;
        }

        .shell { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 0;
        }

        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            font-size: xx-large;
            place-items: center;
            border-radius: 13px;
            color: white;
            background: linear-gradient(135deg, #796cf7, var(--primary-dark));
            box-shadow: 0 9px 22px rgba(91, 76, 240, .26);
        }

        .logout-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            color: var(--ink);
            font: inherit;
            font-weight: 700;
            background: rgba(255, 255, 255, .82);
            cursor: pointer;
            transition: border-color .2s, color .2s, transform .15s, box-shadow .2s;
        }
        .logout-button:hover { color: var(--primary); border-color: #c9c3ff; box-shadow: 0 8px 24px rgba(28, 35, 60, .08); }
        .logout-button:active { transform: translateY(1px); }

        main { padding: 64px 0 100px; }
        .eyebrow { margin: 0 0 14px; color: var(--primary); font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
        h1 { max-width: 720px; margin: 0; font-size: clamp(42px, 7vw, 76px); line-height: 1.02; letter-spacing: -.055em; }
        .intro { max-width: 570px; margin: 22px 0 42px; color: var(--muted); font-size: 18px; line-height: 1.7; }

        .profile-card {
            max-width: 620px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, .9);
            border-radius: 22px;
            background: rgba(255, 255, 255, .9);
            box-shadow: 0 22px 60px rgba(28, 35, 60, .1);
        }
        .avatar { width: 58px; height: 58px; display: grid; place-items: center; border-radius: 18px; color: white; font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #26b9a4, #168d7e); }
        .profile-label { margin: 0 0 5px; color: var(--muted); font-size: 13px; }
        .profile-name { margin: 0; font-size: 19px; font-weight: 800; }

        @media (max-width: 560px) {
            .shell { width: min(100% - 28px, 1120px); }
            header { padding: 20px 0; }
            main { padding-top: 50px; }
            .brand-text { display: none; }
            .profile-card { padding: 19px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div class="brand"><span class="brand-mark">🛡️</span><span class="brand-text">Student Portal</span></div>
            <button class="logout-button" id="logoutButton" type="button" aria-label="Log out of your account">
                <span aria-hidden="true">&#8594;</span> Log out
            </button>
        </header>

        <main>
            <p class="eyebrow">Your dashboard</p>
            <h1 id="greet">Welcome back.</h1>
            <p class="intro">You’re signed in and ready to go. Your student account is securely connected to this session.</p>

            <section class="profile-card" aria-label="Student profile">
                <div class="avatar" id="avatar" aria-hidden="true">S</div>
                <div>
                    <p class="profile-label">Signed in as</p>
                    <p class="profile-name" id="profileName">Student</p>
                </div>
            </section>
        </main>
    </div>

    <script>
// Fetch profile on page load
fetch("http://localhost:8080/profile", {
    method: "GET",
    credentials: "include"
})
.then(response => {
    if (!response.ok) {
        // Session not valid → go back to login
        // window.location.replace("login.html");
        return;
    }
    return response.json();
})
.then(student => {
    if (!student) return;
    document.getElementById("greet").textContent = "Welcome back, " + student.name + ".";
    document.getElementById("profileName").textContent = student.name;
    const initial = student.name.charAt(0).toUpperCase();
    document.getElementById("avatar").textContent = initial;
})
.catch(error => {
    console.error(error);
    window.location.replace("login.html");
});

// Fix logout: POST not GET
document.getElementById("logoutButton").addEventListener("click", async () => {
    await fetch("http://localhost:8080/logout", {
        method: "POST",   // ← was GET, must be POST
        credentials: "include"

    });
    window.location.replace("login.html");
});
    </script>
</body>
</html>
